name: Wagehat Staging CI

on:
  push:
    branches: [staging]

env:
  NODE_ENV: staging
  SERVICE_NAME: wagehat-stg
  DEPLOY_DIRECTORY: '~/deploy/wagehat-stg'

  DOCKER_USER: ${{ secrets.DOCKER_HUB_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}

  HOST: ${{ secrets.STAGING_HOST }}
  USER: ${{ secrets.STAGING_USER }}
  SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}

  ENV_VARS: ${{ secrets.STAGING_ENV_VARS }}

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load Environment Variables and Generate docker-compose.yml
        run: |
          echo "📝 Writing env vars to ./environments/${{env.NODE_ENV}}.env"
          mkdir -p ./environments
          echo "${{ env.ENV_VARS }}" > ./environments/${{env.NODE_ENV}}.env

          echo "🔁 Converting to KEY=\"VALUE\" format"
          sed -E 's/^([^=]+)=(.*)$/\1="\2"/' ./environments/${{env.NODE_ENV}}.env > temp.env
          mv temp.env ./environments/${{env.NODE_ENV}}.env

          echo "🧼 Removing Windows line endings"
          sed -i 's/\r$//' ./environments/${{env.NODE_ENV}}.env

          echo "📂 List files in environments directory:"
          ls -l ./environments

          echo "🌱 Export env vars to shell"
          set -a
          source ./environments/${{env.NODE_ENV}}.env
          set +a

          echo "📦 Generating docker-compose.yml"
          envsubst < docker-compose.template.yml > docker-compose.yml

          echo "📄 Display docker-compose.yml:"
          cat docker-compose.yml

      - name: Ensure Docker Compose, Env File Exist
        run: |
          if [ ! -f environments/${{env.NODE_ENV}}.env ]; then
            echo "File environments/${{env.NODE_ENV}}.env does not exist."
            exit 1
          fi
          if [ ! -f docker-compose.yml ]; then
            echo "File docker-compose.yml does not exist."
            exit 1
          fi

      - name: Transfer Docker Compose and Env Files
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USER }}
          key: ${{ env.SSH_KEY }}
          source: 'environments,docker-compose.yml'
          target: ${{ env.DEPLOY_DIRECTORY }}

      - name: Log in to Docker Hub
        run: docker login -u ${{env.DOCKER_USER}} -p ${{env.DOCKER_PASSWORD}}
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag ${{env.DOCKER_USER}}/${{env.SERVICE_NAME}}:latest
      - name: Docker Push
        run: docker push ${{env.DOCKER_USER}}/${{env.SERVICE_NAME}}:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIRECTORY }}

            echo "Logging to Docker Hub"
            docker login -u ${{env.DOCKER_USER}} -p ${{env.DOCKER_PASSWORD}}

            echo "Stopping previous build"
            docker stop ${{ env.SERVICE_NAME }} || true

            echo "Removing previous build"
            docker rm ${{ env.SERVICE_NAME }} || true

            echo "Remove previous image"
            docker image prune -a -f

            echo "Starting latest build"
            docker compose --env-file environments/${{env.NODE_ENV}}.env -f docker-compose.yml up -d

            echo "Deploy Done"
