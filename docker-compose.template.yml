services:
  ${APP_NAME}:
    container_name: ${APP_NAME}
    image: ${DOCKER_USER}/${APP_NAME}:latest
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - '/var/www/uploads:/uploads'
      - './logs:/app/logs'
    env_file:
      - ./environments/${NODE_ENV}.env
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
    restart: always
    networks:
      - crisisdesk-net

networks:
  crisisdesk-net:
    driver: bridge
