# Production / CI deploy stack (Postgres + pgvector, Valkey, API).
# Generated by GitHub Actions via envsubst (DOCKER_USER, APP_NAME, NODE_ENV only).
# Remaining ${...} vars are resolved by `docker compose --env-file` on the server.
#
# No host Postgres/Valkey/nginx required — only Docker. Publish the API port.

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: crisisdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-crisisdesk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crisisdesk}
      POSTGRES_DB: ${DB_DATABASE:-crisis-desk-ai}
    volumes:
      - crisisdesk-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-crisisdesk} -d ${DB_DATABASE:-crisis-desk-ai}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crisisdesk-net

  valkey:
    image: valkey/valkey:8-alpine
    container_name: crisisdesk-valkey
    restart: unless-stopped
    command: ['valkey-server', '--requirepass', '${QUEUE_PASSWORD:-crisisdesk}']
    healthcheck:
      test: ['CMD', 'valkey-cli', '-a', '${QUEUE_PASSWORD:-crisisdesk}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crisisdesk-net

  app:
    image: ${DOCKER_USER}/${APP_NAME}:latest
    container_name: ${APP_NAME}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - ./environments/${NODE_ENV}.env
    environment:
      # Reach compose services on the internal network (env file may say localhost).
      NODE_ENV: ${NODE_ENV}
      PORT: 5000
      API_PREFIX: api
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-crisisdesk}
      DB_PASSWORD: ${DB_PASSWORD:-crisisdesk}
      DB_DATABASE: ${DB_DATABASE:-crisis-desk-ai}
      DB_SSL_MODE: 'false'
      QUEUE_HOST: valkey
      QUEUE_PORT: 6379
      QUEUE_USERNAME: default
      QUEUE_PASSWORD: ${QUEUE_PASSWORD:-crisisdesk}
      CACHE_STORE_HOST: valkey
      CACHE_STORE_PORT: 6379
      CACHE_STORE_USERNAME: default
      CACHE_STORE_PASSWORD: ${QUEUE_PASSWORD:-crisisdesk}
    ports:
      - '${PORT:-5000}:5000'
    volumes:
      - ./logs:/app/logs
    networks:
      - crisisdesk-net

volumes:
  crisisdesk-db-data:

networks:
  crisisdesk-net:
    driver: bridge
