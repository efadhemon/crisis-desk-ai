# CrisisDesk AI — fully self-contained stack (Postgres + pgvector, Redis, API).
#
# 1) Put your config (incl. GEMINI_API_KEY) in environments/development.env
#    (or production.env / staging.env). The app service loads it via env_file.
# 2) Run everything with one command:
#
#      docker compose up --build                         # uses development.env
#      NODE_ENV=production docker compose up --build      # uses production.env
#      NODE_ENV=staging    docker compose up --build      # uses staging.env
#
# Host ports default to NON-standard values so they never clash with a globally
# installed Postgres (5432) or Redis (6379). Override any of them if needed:
#
#   APP_PORT=5000 DB_PORT_HOST=5433 REDIS_PORT_HOST=6380 docker compose up --build
#
# Inside the compose network the services still use their standard ports
# (db:5432, redis:6379); only the host-published ports change. The DB/Redis
# connection settings and credentials are pinned to the compose services (the
# env file's localhost:5433/6380 values are only for host-based dev).

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: crisisdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-crisisdesk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crisisdesk}
      POSTGRES_DB: ${DB_DATABASE:-crisis-desk-ai}
    ports:
      - '${DB_PORT_HOST:-5433}:5432'
    volumes:
      - crisisdesk-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-crisisdesk} -d ${DB_DATABASE:-crisis-desk-ai}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crisisdesk-net

  redis:
    image: redis:7-alpine
    container_name: crisisdesk-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-crisisdesk}']
    ports:
      - '${REDIS_PORT_HOST:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-crisisdesk}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crisisdesk-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisisdesk-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # All app config (Gemini key, JWT, admin creds, etc.) is loaded from the
    # selected environment file. Default is development; switch with NODE_ENV:
    #   NODE_ENV=production docker compose up      -> environments/production.env
    #   NODE_ENV=staging    docker compose up      -> environments/staging.env
    env_file:
      - ./environments/${NODE_ENV:-development}.env
    environment:
      # These override the env file so the app reaches the compose services on the
      # internal network (the env files use localhost:5433/6380 for host-based
      # dev) and stay in sync with the db/redis credentials configured above.
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      API_PREFIX: api
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-crisisdesk}
      DB_PASSWORD: ${DB_PASSWORD:-crisisdesk}
      DB_DATABASE: ${DB_DATABASE:-crisis-desk-ai}
      DB_SSL_MODE: 'false'
      QUEUE_HOST: redis
      QUEUE_PORT: 6379
      QUEUE_USERNAME: default
      QUEUE_PASSWORD: ${REDIS_PASSWORD:-crisisdesk}
      CACHE_STORE_HOST: redis
      CACHE_STORE_PORT: 6379
      CACHE_STORE_USERNAME: default
      CACHE_STORE_PASSWORD: ${REDIS_PASSWORD:-crisisdesk}
    ports:
      - '${APP_PORT:-5000}:5000'
    volumes:
      - ./logs:/app/logs
    networks:
      - crisisdesk-net

volumes:
  crisisdesk-db-data:

networks:
  crisisdesk-net:
    driver: bridge
